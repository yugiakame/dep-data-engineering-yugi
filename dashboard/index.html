<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My DEP Project</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 860px;
      margin: 2rem auto;
      padding: 0 1.5rem;
      color: #1a1a1a;
      line-height: 1.6;
    }
    h1 { font-size: 2rem; margin-bottom: 0.25rem; }
    .subtitle { color: #555; margin-bottom: 2rem; }
    section { margin-bottom: 2.5rem; }
    h2 { font-size: 1.2rem; border-bottom: 2px solid #e5e5e5; padding-bottom: 0.4rem; }
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 1rem;
      margin-top: 1rem;
    }
    .kpi-card {
      background: #f5f5f5;
      border-radius: 8px;
      padding: 1rem;
      text-align: center;
    }
    .kpi-value { font-size: 1.8rem; font-weight: 700; }
    .kpi-label { font-size: 0.85rem; color: #666; margin-top: 0.25rem; }
    .chart-placeholder {
      background: #f0f0f0;
      border-radius: 8px;
      height: 240px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #999;
      font-size: 0.9rem;
      margin-top: 1rem;
    }
    footer { font-size: 0.8rem; color: #999; margin-top: 3rem; }
  </style>
</head>
<body>

  <h1><!-- Replace: Your Project Title --></h1>
  <p class="subtitle"><!-- Replace: One-sentence description of what this project measures or predicts --></p>

  <section>
    <h2>Key Numbers</h2>
    <div class="kpi-grid">
      <div class="kpi-card">
        <div class="kpi-value"><!-- value --></div>
        <div class="kpi-label"><!-- KPI 1 label --></div>
      </div>
      <div class="kpi-card">
        <div class="kpi-value"><!-- value --></div>
        <div class="kpi-label"><!-- KPI 2 label --></div>
      </div>
      <div class="kpi-card">
        <div class="kpi-value"><!-- value --></div>
        <div class="kpi-label"><!-- KPI 3 label --></div>
      </div>
    </div>
  </section>

  <section>
    <h2><!-- Replace: Chart or Analysis Title --></h2>
    <!--
      Replace this placeholder with an actual chart.
      Options:
        - <img> tag pointing to a saved chart in output/figures/
        - Inline Chart.js or Plotly script
        - A table of results
    -->
    <div class="chart-placeholder">[ Replace with your chart or table ]</div>
  </section>

  <section>
    <h2>Key Findings</h2>
    <ul>
      <li><!-- Finding 1 --></li>
      <li><!-- Finding 2 --></li>
      <li><!-- Finding 3 --></li>
    </ul>
  </section>

  <section>
    <h2>Data Source</h2>
    <p><!-- Describe your data source: name, URL, date range, format --></p>
  </section>

  <footer>
    Built by <!-- Your Name --> &middot; DEP Data Engineering Open Track 2026 &middot;
    <a href="https://github.com/<!-- your-username/your-repo -->">GitHub Repo</a>
  </footer>

</body>
</html>
