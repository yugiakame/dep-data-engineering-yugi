name: "Milestone 6 — Live Deployment"
description: Submit your final deployed project for M6 review.
title: "[M6] <Your Name> — <Project Title>"
labels: ["milestone-submission", "M6", "auto-check-pending"]
body:
  - type: markdown
    attributes:
      value: |
        **Milestone 6 — Live Deployment**
        Fill in all fields. The auto-checker runs as soon as you submit this issue.
        Congratulations on reaching the final milestone!

  - type: input
    id: builder_name
    attributes:
      label: Builder Name
      placeholder: "e.g. Maria Santos"
    validations:
      required: true

  - type: input
    id: cohort
    attributes:
      label: Cohort
      placeholder: "e.g. 2026-A"
    validations:
      required: true

  - type: input
    id: repo_url
    attributes:
      label: GitHub Repo URL
      description: Public URL of your forked Starter Kit repo.
      placeholder: "https://github.com/<your-username>/dep-starter-kit"
    validations:
      required: true

  - type: input
    id: commit_hash
    attributes:
      label: Commit Hash
      description: The full 40-character commit hash of the submission snapshot.
      placeholder: "e.g. a1b2c3d4e5f6..."
    validations:
      required: true

  - type: input
    id: live_url
    attributes:
      label: Live Project URL
      description: The public URL where your deployed dashboard or report is accessible.
      placeholder: "https://<your-username>.github.io/dep-starter-kit/"
    validations:
      required: true

  - type: checkboxes
    id: self_check
    attributes:
      label: Self-Check
      description: Confirm each item before submitting.
      options:
        - label: "`dashboard/index.html` exists in my repo."
          required: true
        - label: The live URL above loads correctly in a browser.
          required: true
        - label: "`requirements.txt` is complete and up to date."
          required: true
        - label: My README includes the live URL and a project summary.
          required: true
        - label: I have a short demo script or presentation ready.
          required: true
        - label: The commit hash above points to my latest submission snapshot.
          required: true
