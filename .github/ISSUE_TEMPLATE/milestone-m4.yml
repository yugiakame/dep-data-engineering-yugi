name: "Milestone 4 — Analysis & Insights"
description: Submit your Phase 4 analysis and insights work for M4 review.
title: "[M4] <Your Name> — <Project Title>"
labels: ["milestone-submission", "M4", "auto-check-pending"]
body:
  - type: markdown
    attributes:
      value: |
        **Milestone 4 — Analysis & Insights**
        Fill in all fields. The auto-checker runs as soon as you submit this issue.

  - type: input
    id: builder_name
    attributes:
      label: Builder Name
      placeholder: "e.g. Maria Santos"
    validations:
      required: true

  - type: input
    id: cohort
    attributes:
      label: Cohort
      placeholder: "e.g. 2026-A"
    validations:
      required: true

  - type: input
    id: repo_url
    attributes:
      label: GitHub Repo URL
      description: Public URL of your forked Starter Kit repo.
      placeholder: "https://github.com/<your-username>/dep-starter-kit"
    validations:
      required: true

  - type: input
    id: commit_hash
    attributes:
      label: Commit Hash
      description: The full 40-character commit hash of the submission snapshot.
      placeholder: "e.g. a1b2c3d4e5f6..."
    validations:
      required: true

  - type: checkboxes
    id: self_check
    attributes:
      label: Self-Check
      description: Confirm each item before submitting.
      options:
        - label: "`notebooks/` contains at least one `.ipynb` analysis notebook."
          required: true
        - label: The notebook runs end-to-end without errors on `data/processed/` inputs.
          required: true
        - label: "`requirements.txt` is up to date."
          required: true
        - label: My README documents the key findings and links to the notebook.
          required: true
        - label: The commit hash above points to my latest submission snapshot.
          required: true