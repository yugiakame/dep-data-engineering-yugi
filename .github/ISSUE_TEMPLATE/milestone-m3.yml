name: "Milestone 3 — Data Processing"
description: Submit your Phase 3 data processing work for M3 review.
title: "[M3] <Your Name> — <Project Title>"
labels: ["milestone-submission", "M3", "auto-check-pending"]
body:
  - type: markdown
    attributes:
      value: |
        **Milestone 3 — Data Processing**
        Fill in all fields. The auto-checker runs as soon as you submit this issue.

  - type: input
    id: builder_name
    attributes:
      label: Builder Name
      placeholder: "e.g. Maria Santos"
    validations:
      required: true

  - type: input
    id: cohort
    attributes:
      label: Cohort
      placeholder: "e.g. 2026-A"
    validations:
      required: true

  - type: input
    id: repo_url
    attributes:
      label: GitHub Repo URL
      description: Public URL of your forked Starter Kit repo.
      placeholder: "https://github.com/<your-username>/dep-starter-kit"
    validations:
      required: true

  - type: input
    id: commit_hash
    attributes:
      label: Commit Hash
      description: The full 40-character commit hash of the submission snapshot.
      placeholder: "e.g. a1b2c3d4e5f6..."
    validations:
      required: true

  - type: checkboxes
    id: self_check
    attributes:
      label: Self-Check
      description: Confirm each item before submitting.
      options:
        - label: "`scripts/transform.py` exists and runs without crashing."
          required: true
        - label: "`data/processed/` contains at least one output file from the transformation."
          required: true
        - label: "`requirements.txt` is up to date."
          required: true
        - label: My README documents the schema and how to run the transformation script.
          required: true
        - label: The commit hash above points to my latest submission snapshot.
          required: true