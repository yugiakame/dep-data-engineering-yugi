name: "Milestone 1 — Foundations Complete"
description: Submit your Phase 1 foundations work for M1 review.
title: "[M1] <Your Name> — <Project Title>"
labels: ["milestone-submission", "M1", "auto-check-pending"]
body:
  - type: markdown
    attributes:
      value: |
        **Milestone 1 — Foundations Complete**
        Fill in all fields. The auto-checker runs as soon as you submit this issue.
        M1 is a **hard gate** — moderator review required before you proceed to Phase 2.

  - type: input
    id: builder_name
    attributes:
      label: Builder Name
      placeholder: "e.g. Maria Santos"
    validations:
      required: true

  - type: input
    id: cohort
    attributes:
      label: Cohort
      placeholder: "e.g. 2026-A"
    validations:
      required: true

  - type: input
    id: repo_url
    attributes:
      label: GitHub Repo URL
      description: Public URL of your forked Starter Kit repo.
      placeholder: "https://github.com/<your-username>/dep-starter-kit"
    validations:
      required: true

  - type: input
    id: commit_hash
    attributes:
      label: Commit Hash
      description: The full 40-character commit hash of the submission snapshot.
      placeholder: "e.g. a1b2c3d4e5f6..."
    validations:
      required: true

  - type: checkboxes
    id: self_check
    attributes:
      label: Self-Check
      description: Confirm each item before submitting.
      options:
        - label: My repo has the required folder structure — `data/raw/`, `data/processed/`, `scripts/`, `notebooks/`.
          required: true
        - label: My `requirements.txt` exists at the repo root.
          required: true
        - label: My README describes the problem, data source, and project goal.
          required: true
        - label: The commit hash above points to my latest submission snapshot.
          required: true
