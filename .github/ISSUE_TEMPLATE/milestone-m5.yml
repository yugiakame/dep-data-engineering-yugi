name: "Milestone 5 — Predictive / Alt Track"
description: Submit your Phase 5 work (Path A or Path B) for M5 review.
title: "[M5] <Your Name> — <Project Title>"
labels: ["milestone-submission", "M5", "auto-check-pending"]
body:
  - type: markdown
    attributes:
      value: |
        **Milestone 5 — Predictive / Alt Track**
        Fill in all fields. The auto-checker runs as soon as you submit this issue.
        Indicate which path you took (Path A or Path B) in the notes field.

  - type: input
    id: builder_name
    attributes:
      label: Builder Name
      placeholder: "e.g. Maria Santos"
    validations:
      required: true

  - type: input
    id: cohort
    attributes:
      label: Cohort
      placeholder: "e.g. 2026-A"
    validations:
      required: true

  - type: input
    id: repo_url
    attributes:
      label: GitHub Repo URL
      description: Public URL of your forked Starter Kit repo.
      placeholder: "https://github.com/<your-username>/dep-starter-kit"
    validations:
      required: true

  - type: input
    id: commit_hash
    attributes:
      label: Commit Hash
      description: The full 40-character commit hash of the submission snapshot.
      placeholder: "e.g. a1b2c3d4e5f6..."
    validations:
      required: true

  - type: dropdown
    id: path
    attributes:
      label: Which path did you take?
      options:
        - "Path A — Predictive / ML"
        - "Path B — Advanced EDA & Stakeholder Track"
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Notes (optional)
      description: Anything the reviewer should know about your approach or path-specific choices.
      placeholder: "e.g. I used a regression model to predict X because..."

  - type: checkboxes
    id: self_check
    attributes:
      label: Self-Check (both paths)
      description: Confirm each item before submitting.
      options:
        - label: "`requirements.txt` is up to date with all dependencies."
          required: true
        - label: "`notebooks/` contains analysis or model notebooks."
          required: true
        - label: "`data/processed/` contains all output files needed for the next phase."
          required: true
        - label: The commit hash above points to my latest submission snapshot.
          required: true

  - type: checkboxes
    id: path_a_check
    attributes:
      label: Path A Additional Checks (skip if Path B)
      options:
        - label: Model results or predictions are saved to `output/` or `data/processed/`.
        - label: Model metrics and assumptions are documented in the notebook or README.

  - type: checkboxes
    id: path_b_check
    attributes:
      label: Path B Additional Checks (skip if Path A)
      options:
        - label: Segmentation or advanced EDA outputs are saved.
        - label: A stakeholder brief or KPI summary is included.
