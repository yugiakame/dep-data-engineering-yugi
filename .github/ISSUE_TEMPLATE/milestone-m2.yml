name: "Milestone 2 — Data Ingestion"
description: Submit your Phase 2 data ingestion work for M2 review.
title: "[M2] <Your Name> — <Project Title>"
labels: ["milestone-submission", "M2", "auto-check-pending"]
body:
  - type: markdown
    attributes:
      value: |
        **Milestone 2 — Data Ingestion**
        Fill in all fields. The auto-checker runs as soon as you submit this issue.

  - type: input
    id: builder_name
    attributes:
      label: Builder Name
      placeholder: "e.g. Maria Santos"
    validations:
      required: true

  - type: input
    id: cohort
    attributes:
      label: Cohort
      placeholder: "e.g. 2026-A"
    validations:
      required: true

  - type: input
    id: repo_url
    attributes:
      label: GitHub Repo URL
      description: Public URL of your forked Starter Kit repo.
      placeholder: "https://github.com/<your-username>/dep-starter-kit"
    validations:
      required: true

  - type: input
    id: commit_hash
    attributes:
      label: Commit Hash
      description: The full 40-character commit hash of the submission snapshot.
      placeholder: "e.g. a1b2c3d4e5f6..."
    validations:
      required: true

  - type: checkboxes
    id: self_check
    attributes:
      label: Self-Check
      description: Confirm each item before submitting.
      options:
        - label: "`scripts/ingest.py` exists and runs without crashing."
          required: true
        - label: "`data/raw/` contains at least one real data file (not just `.gitkeep`)."
          required: true
        - label: "`requirements.txt` lists all dependencies used in ingestion."
          required: true
        - label: My README documents the data source and how to run the ingestion script.
          required: true
        - label: The commit hash above points to my latest submission snapshot.
          required: true